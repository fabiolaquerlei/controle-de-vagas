<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Vagas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
:root {
  --bg:#f0f2f5; --surface:#fff; --border:#dde1e7; --borderl:#eef0f3;
  --text:#111827; --textsm:#4b5563; --textxs:#9ca3af;
  --accent:#1a3a5c; --accentm:#2d5a8e; --accentl:#e8edf5;
  --hbg:#1a3a5c; --hover:#eef3fa; --alt:#fafbfc;
  --sh:0 1px 3px rgba(0,0,0,.07); --shlg:0 4px 20px rgba(0,0,0,.14);
  --gfg:#166534; --gbg:#dcfce7;
  --yfg:#854d0e; --ybg:#fef9c3;
  --rfg:#991b1b; --rbg:#fee2e2;
  --bfg1:#166534; --bbg1:#dcfce7;
  --bfg2:#1e40af; --bbg2:#dbeafe;
  --bfg3:#991b1b; --bbg3:#fee2e2;
  --bfg4:#854d0e; --bbg4:#fef3c7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--hbg);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.ttitle{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.tsub{font-size:11px;color:rgba(255,255,255,.5);margin-left:4px}
.tsp{flex:1}
.tsave{font-size:11px;color:rgba(255,255,255,.45);transition:color .2s}
.tsave.dirty{color:#fbbf24}.tsave.saved{color:#86efac}

/* TABBAR */
.tabbar{background:var(--surface);border-bottom:2px solid var(--border);display:flex;padding:0 16px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--textsm);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap}
.tab:hover{color:var(--accent)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tcnt{background:var(--accentl);color:var(--accent);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}
.tab.active .tcnt{background:var(--accent);color:#fff}

/* TOOLBAR */
.toolbar{padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--borderl);box-shadow:var(--sh)}
.swrap{position:relative;flex:1;min-width:160px;max-width:320px}
.swrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--textxs);pointer-events:none}
.sinput{width:100%;padding:6px 10px 6px 30px;border:1px solid var(--border);border-radius:6px;font-family:'Barlow',sans-serif;font-size:12px;outline:none;background:#fff;color:var(--text);transition:border-color .15s}
.sinput:focus{border-color:var(--accentm)}
.fbtn{padding:5px 11px;border:1px solid var(--border);border-radius:20px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}.fbtn.on{color:#fff}
.fbtn.f1.on{background:var(--bfg1);border-color:var(--bfg1)}
.fbtn.f2.on{background:var(--bfg2);border-color:var(--bfg2)}
.fbtn.f3.on{background:var(--bfg3);border-color:var(--bfg3)}
.fbtn.f4.on{background:#b45309;border-color:#b45309}
.tsp2{flex:1}
.clabel{font-size:11px;color:var(--textxs);white-space:nowrap}
.btnadd{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s;white-space:nowrap}
.btnadd:hover{background:var(--accentm)}

/* SHEET */
.sheet{display:none}.sheet.active{display:block}
.twrap{overflow:auto;max-height:calc(100vh - 162px);border-bottom:1px solid var(--border)}

/* TABLE */
table{border-collapse:collapse;width:max-content;min-width:100%;font-size:12px}
thead{position:sticky;top:0;z-index:50}
thead th{background:var(--hbg);color:#fff;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:0 8px;height:34px;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08);cursor:pointer;user-select:none}
thead th:hover{background:#244d7a}
thead th .sa{opacity:.5;margin-left:3px;font-size:9px}
thead th.sorted .sa{opacity:1}
thead th.col-act,tbody td.col-act{width:28px;min-width:28px;text-align:center;padding:0 3px;cursor:default}

/* BODY ROWS */
tbody tr{border-bottom:1px solid var(--borderl)}
tbody tr:nth-child(even){background:var(--alt)}
tbody tr:hover{background:var(--hover) !important}

/* ── CELLS: inputs live directly in every td ── */
tbody td{
  padding:0;
  vertical-align:middle;
  border-right:1px solid var(--borderl);
  position:relative;
}
tbody td:last-child{border-right:none}

/* Base cell input — invisible until focused */
tbody td input.ci,
tbody td select.ci,
tbody td textarea.ci {
  display:block;
  width:100%;
  min-height:30px;
  padding:4px 8px;
  border:2px solid transparent;
  background:transparent;
  font-family:'Barlow',sans-serif;
  font-size:12px;
  color:inherit;
  outline:none;
  transition:border-color .12s, background .12s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.35;
}
/* FOCUS — highlight like Excel cell */
tbody td input.ci:focus,
tbody td select.ci:focus,
tbody td textarea.ci:focus {
  border-color: #1a7fe0;
  background: #fffde7;
  position:relative;
  z-index:5;
  white-space:normal;
  overflow:visible;
  text-overflow:clip;
  box-shadow: 0 0 0 1px #1a7fe0;
}
tbody td select.ci{cursor:pointer;appearance:auto;-webkit-appearance:auto}
tbody td textarea.ci{resize:none;overflow:hidden}
tbody td textarea.ci:focus{overflow:auto;resize:vertical;min-height:52px}

/* BADGE inside select display */
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.b1{color:var(--bfg1);background:var(--bbg1)}
.b2{color:var(--bfg2);background:var(--bbg2)}
.b3{color:var(--bfg3);background:var(--bbg3)}
.b4{color:var(--bfg4);background:var(--bbg4)}
.b0{color:#374151;background:#f3f4f6}

/* STATUS-DIAS column — full dark blue */
td.sdias{background:var(--hbg) !important;color:#fff !important}
td.sdias input.ci{color:#fff;background:transparent}
td.sdias input.ci:focus{background:#1e4d7a;color:#fff;border-color:#5b9bd5;box-shadow:0 0 0 1px #5b9bd5}
tbody tr:hover td.sdias{background:#244d7a !important}

/* DIAS column — colored by value */
td.d-ok{background:var(--gbg) !important;color:var(--gfg) !important;font-weight:700;text-align:center}
td.d-warn{background:var(--ybg) !important;color:var(--yfg) !important;font-weight:700;text-align:center}
td.d-over{background:var(--rbg) !important;color:var(--rfg) !important;font-weight:700;text-align:center}
td.d-ok input.ci,td.d-warn input.ci,td.d-over input.ci{background:transparent;color:inherit;font-weight:700;text-align:center}
td.d-ok input.ci:focus,td.d-warn input.ci:focus,td.d-over input.ci:focus{background:#fffde7;color:var(--text)}

/* DELETE BTN */
.bdel{width:22px;height:22px;border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#9ca3af;transition:all .15s}
.bdel:hover{background:#fee2e2;border-color:#ef4444;color:#dc2626}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:10px;box-shadow:var(--shlg);width:800px;max-width:96vw;max-height:92vh;overflow-y:auto}
.mhdr{background:var(--hbg);color:#fff;padding:16px 20px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:10px}
.mhdr h2{font-size:15px;font-weight:600;flex:1}
.mclose{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;padding:2px 6px}
.mclose:hover{color:#fff}
.mbody{padding:20px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.fg{display:flex;flex-direction:column;gap:4px}.fg.s2{grid-column:span 2}
.fg label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--textsm)}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid var(--border);border-radius:5px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--text);outline:none;background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accentm)}
.fg textarea{min-height:60px;resize:vertical}
.mfoot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.bcanc{padding:8px 18px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.bcanc:hover{background:#f3f4f6}
.bsave{padding:8px 20px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.bsave:hover{background:var(--accentm)}

/* CONFIRM */
.cbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;align-items:center;justify-content:center}
.cbg.open{display:flex}
.cbox{background:#fff;border-radius:8px;padding:24px;width:340px;box-shadow:var(--shlg);text-align:center}
.cbox p{margin-bottom:18px;font-size:13px;line-height:1.5}.cbox strong{color:#dc2626}
.cbtns{display:flex;gap:10px;justify-content:center}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f3f4f6}
::-webkit-scrollbar-thumb{background:#c1c8d0;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9ca3af}
.norows td{text-align:center;padding:30px;color:var(--textxs);font-style:italic}
</style>
</head>
<body>

<div class="topbar">
  <span class="ttitle">CONTROLE DE VAGAS</span>
  <span class="tsub">R&amp;S — Gente &amp; Gestão</span>
  <div class="tsp"></div>
  <span class="tsave" id="saveStatus">● Salvo automaticamente</span>
</div>

<div class="tabbar">
  <button class="tab active" data-tab="vagas" onclick="switchTab('vagas')">📋 Vagas 2026 <span class="tcnt" id="cnt-vagas">0</span></button>
  <button class="tab" data-tab="candidatos" onclick="switchTab('candidatos')">👤 Candidatos <span class="tcnt" id="cnt-candidatos">0</span></button>
</div>

<div class="sheet active" id="sheet-vagas">
  <div class="toolbar">
    <div class="swrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="sinput" placeholder="Buscar vaga, unidade, responsável..." id="search-vagas" oninput="applyF('vagas')">
    </div>
    <button class="fbtn f1" id="fv-1" onclick="toggleF('vagas','FECHADA')">✓ Fechada</button>
    <button class="fbtn f2" id="fv-2" onclick="toggleF('vagas','EM ANDAMENTO')">◉ Em Andamento</button>
    <button class="fbtn f3" id="fv-3" onclick="toggleF('vagas','CANCELADA')">✕ Cancelada</button>
    <button class="fbtn f4" id="fv-4" onclick="toggleF('vagas','STAND BY')">⏸ Stand By</button>
    <div class="tsp2"></div>
    <span class="clabel" id="lbl-vagas"></span>
    <button class="btnadd" onclick="openModal('vagas')">＋ Nova Vaga</button>
  </div>
  <div class="twrap"><table><thead id="th-vagas"></thead><tbody id="tb-vagas"></tbody></table></div>
</div>

<div class="sheet" id="sheet-candidatos">
  <div class="toolbar">
    <div class="swrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="sinput" placeholder="Buscar nome, vaga, cidade, status..." id="search-candidatos" oninput="applyF('candidatos')">
    </div>
    <button class="fbtn f2" id="fc-1" onclick="toggleF('candidatos','Aprovado')">✓ Aprovado</button>
    <button class="fbtn f3" id="fc-2" onclick="toggleF('candidatos','Reprovado')">✕ Reprovado</button>
    <div class="tsp2"></div>
    <span class="clabel" id="lbl-candidatos"></span>
    <button class="btnadd" onclick="openModal('candidatos')">＋ Novo Candidato</button>
  </div>
  <div class="twrap"><table><thead id="th-candidatos"></thead><tbody id="tb-candidatos"></tbody></table></div>
</div>

<div class="mbg" id="add-modal">
  <div class="modal">
    <div class="mhdr"><h2 id="modal-title">Nova Vaga</h2><button class="mclose" onclick="closeModal()">✕</button></div>
    <div class="mbody"><div class="fgrid" id="modal-form"></div></div>
    <div class="mfoot"><button class="bcanc" onclick="closeModal()">Cancelar</button><button class="bsave" onclick="saveModal()">Salvar</button></div>
  </div>
</div>

<div class="cbg" id="confirm-bg">
  <div class="cbox">
    <p>Tem certeza que deseja <strong>excluir esta linha</strong>?<br>Esta ação não pode ser desfeita.</p>
    <div class="cbtns"><button class="bcanc" onclick="closeConfirm()">Cancelar</button><button class="bsave" style="background:#dc2626" onclick="doDelete()">Excluir</button></div>
  </div>
</div>

- MS", "2026-04-07 00:00:00", "", "REPROVADO", "Outro candidato escolhido "], ["ORMINDO FERREIRA PRAIA", " 92 98449-2955", "TÉC. ENGENHARIA CLÍNICA", "MANAUS - MT", "NaT", "", "REPROVADO", "Maria declinou o mesmo "]]}};

const CCFG={
  'MÊS DE ABERTURA':{w:92,t:'mes'},
  'ANO':{w:52},
  'QT':{w:38},
  'MODALIDADE':{w:84},
  'VAGA':{w:235,wrap:true},
  'SALÁRIO':{w:105,t:'moeda'},
  'COMPLEMENTO SALARIAL':{w:148,wrap:true},
  'GRUPO DE TRABALHO':{w:112},
  'UNIDADE':{w:185,wrap:true},
  'LOCALIZAÇÃO':{w:132},
  'SUPERVISOR RESPONSÁVEL':{w:165},
  'TIPO DE SOLICITAÇÃO':{w:142},
  'SUBSTITUIÇÃO':{w:185,wrap:true},
  'HORÁRIO DE TRABALHO':{w:122},
  'STATUS':{w:124,t:'svaga'},
  'ETAPA DO PROCESSO':{w:162,wrap:true},
  'MEIOS DE DIVULGAÇÃO ':{w:132},
  'MEIOS DE DIVULGAÇÃO':{w:132},
  'RESPONSÁVEL':{w:102},
  'ABERTURA':{w:86},
  'FECHAMENTO':{w:86},
  'DIAS                    (FECHADA X EM ABERTO)':{w:96,t:'sdias',label:'STATUS DIAS'},
  'DIAS':{w:55,t:'dias'},
  'COLABORADOR ADMITIDO':{w:192,wrap:true},
  'ADMISSÃO PREVISTA':{w:102},
  'OBSERVAÇÕES':{w:225,wrap:true},
  'Nome':{w:182},
  'Contato':{w:122},
  'Vaga':{w:212,wrap:true},
  'Cidade':{w:112},
  'Entrevista':{w:90},
  'Horario':{w:70},
  'Status do Processo':{w:122,t:'scand'},
  'OBS':{w:235,wrap:true}
};

const SV=['','EM ANDAMENTO','FECHADA','CANCELADA','STAND BY'];
const SC=['','Aprovado','Reprovado','Aprovado Gestor','Declinou','Não realizou','Banco de Talentos','Entrevista Gestor'];
const SM=['','JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];

function loadDB(){
  try{const s=localStorage.getItem('cv_v4');if(s)return JSON.parse(s);}catch(e){}
  return{
    vagas:{columns:INITIAL.vagas.columns,rows:JSON.parse(JSON.stringify(INITIAL.vagas.rows))},
    candidatos:{columns:INITIAL.candidatos.columns,rows:JSON.parse(JSON.stringify(INITIAL.candidatos.rows))}
  };
}
let DB=loadDB();
let saveT=null;

function markDirty(){
  const el=document.getElementById('saveStatus');
  el.textContent='● Modificado — salvando...';el.className='tsave dirty';
  clearTimeout(saveT);
  saveT=setTimeout(()=>{
    localStorage.setItem('cv_v4',JSON.stringify(DB));
    el.textContent='● Salvo automaticamente';el.className='tsave saved';
    setTimeout(()=>el.className='tsave',2000);
  },700);
}

const VS={
  vagas:{q:'',fl:new Set(),sc:-1,sd:1,rows:[]},
  candidatos:{q:'',fl:new Set(),sc:-1,sd:1,rows:[]}
};
let pendDel=null,modalSheet=null;

/* TABS */
function switchTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===n));
  document.querySelectorAll('.sheet').forEach(s=>s.classList.toggle('active',s.id==='sheet-'+n));
  applyF(n);
}

/* FILTERS */
const FMAP={
  vagas:{'FECHADA':'fv-1','EM ANDAMENTO':'fv-2','CANCELADA':'fv-3','STAND BY':'fv-4'},
  candidatos:{'Aprovado':'fc-1','Reprovado':'fc-2'}
};
function toggleF(sh,val){
  const vs=VS[sh],bid=FMAP[sh]&&FMAP[sh][val],btn=bid&&document.getElementById(bid);
  if(vs.fl.has(val)){vs.fl.delete(val);btn&&btn.classList.remove('on');}
  else{vs.fl.add(val);btn&&btn.classList.add('on');}
  applyF(sh);
}

function applyF(sh){
  const vs=VS[sh],{columns,rows}=DB[sh];
  vs.q=document.getElementById('search-'+sh)?.value||'';
  let f=rows;
  if(vs.q){const q=vs.q.toLowerCase();f=f.filter(r=>r.some(c=>String(c).toLowerCase().includes(q)));}
  if(vs.fl.size>0){
    const si=columns.findIndex(c=>c==='STATUS'||c==='Status do Processo');
    if(si>=0)f=f.filter(r=>[...vs.fl].some(fv=>String(r[si]).toLowerCase().includes(fv.toLowerCase())));
  }
  if(vs.sc>=0){
    f=[...f].sort((a,b)=>{
      const av=String(a[vs.sc]||'').toLowerCase(),bv=String(b[vs.sc]||'').toLowerCase();
      return av<bv?-vs.sd:av>bv?vs.sd:0;
    });
  }
  vs.rows=f;
  renderBody(sh);
  updateCnt(sh);
}

function updateCnt(sh){
  document.getElementById('cnt-'+sh).textContent=DB[sh].rows.length;
  const lbl=document.getElementById('lbl-'+sh),shown=VS[sh].rows.length,total=DB[sh].rows.length;
  if(lbl)lbl.textContent=shown<total?`${shown} de ${total} exibindo`:`${total} registros`;
}

/* HEADER */
function renderHdr(sh){
  const cols=DB[sh].columns,vs=VS[sh];
  const cells=cols.map((col,i)=>{
    const cfg=CCFG[col]||{},lbl=cfg.label||col;
    const ar=vs.sc===i?(vs.sd===1?'↑':'↓'):'↕',cl=vs.sc===i?' sorted':'';
    const w=cfg.w?` style="min-width:${cfg.w}px"`:'';
    return `<th${w} class="${cl}" onclick="sortT('${sh}',${i})">${esc(lbl)}<span class="sa">${ar}</span></th>`;
  }).join('');
  document.getElementById('th-'+sh).innerHTML=`<tr><th class="col-act"></th>${cells}</tr>`;
}

/* BODY */
function renderBody(sh){
  const cols=DB[sh].columns,vs=VS[sh],tb=document.getElementById('tb-'+sh);
  if(!vs.rows.length){
    tb.innerHTML=`<tr class="norows"><td colspan="${cols.length+1}">Nenhum registro encontrado.</td></tr>`;return;
  }
  const idxMap=vs.rows.map(fr=>DB[sh].rows.indexOf(fr));
  tb.innerHTML=idxMap.map(ri=>{
    const row=DB[sh].rows[ri];
    const cells=cols.map((col,ci)=>{
      const cfg=CCFG[col]||{},val=row[ci]||'';
      const w=cfg.w?`min-width:${cfg.w}px;max-width:${cfg.w+90}px;`:'';
      let tdcls='',tdstyle=`style="${w}"`;

      if(cfg.t==='sdias'){
        tdcls='sdias';
      } else if(cfg.t==='dias'){
        const n=parseFloat(val);
        if(!isNaN(n)){tdcls=n<=30?'d-ok':n<=45?'d-warn':'d-over';}
      }

      return `<td class="${tdcls}" ${tdstyle}>${buildInput(col,cfg,val,sh,ri,ci)}</td>`;
    }).join('');
    return `<tr data-ri="${ri}"><td class="col-act"><button class="bdel" onclick="askDel('${sh}',${ri})">✕</button></td>${cells}</tr>`;
  }).join('');
}

/* BUILD INPUT — real input/select always rendered in cell */
function buildInput(col,cfg,val,sh,ri,ci){
  const oc=`onchange="upd('${sh}',${ri},${ci},this.value)"`;
  const oi=`oninput="upd('${sh}',${ri},${ci},this.value)"`;

  if(cfg.t==='svaga'){
    const bc=badgeCls(val);
    return `<span class="status-cell" onclick="openStatusSel(this)" style="display:flex;align-items:center;padding:4px 8px;cursor:pointer;min-height:30px;">
      <span class="badge ${bc}">${esc(val)||'—'}</span>
    </span>
    <select class="ci status-sel" style="display:none;position:absolute;top:0;left:0;width:100%;z-index:20;" ${oc}
      onblur="closeStatusSel(this)"
      onchange="closeStatusSel(this);upd('${sh}',${ri},${ci},this.value);updateBadge(this)">${SV.map(o=>`<option${o===val?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  }
  if(cfg.t==='scand'){
    return `<select class="ci" ${oc}>${SC.map(o=>`<option${o===val?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  }
  if(cfg.t==='mes'){
    return `<select class="ci" ${oc}>${SM.map(o=>`<option${o===val?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  }
  if(cfg.t==='moeda'){
    const disp=fmtM(val);
    return `<input class="ci" type="text" value="${esc(disp)}"
      onfocus="this.dataset.raw=unfmtM(this.value);this.value=this.dataset.raw"
      onblur="this.value=fmtM(this.value);upd('${sh}',${ri},${ci},unfmtM(this.value))"
      onkeydown="if(event.key==='Enter'){this.blur()}">`;
  }
  if(cfg.t==='sdias'){
    return `<input class="ci" type="text" value="${esc(val)}" ${oi}>`;
  }
  if(cfg.wrap){
    return `<textarea class="ci" style="${cfg.w?`min-width:${cfg.w}px;`:''}" ${oi}>${esc(val)}</textarea>`;
  }
  return `<input class="ci" type="text" value="${esc(val)}" ${oi}>`;
}

/* MOEDA helpers — global so inline onblur can call them */
window.fmtM=function(v){
  if(v===''||v==null)return'';
  const n=parseFloat(String(v).replace(/[^\d,.-]/g,'').replace(',','.'));
  if(isNaN(n))return String(v);
  return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
};
window.unfmtM=function(v){
  if(!v)return'';
  return v.replace(/R\$\s*/g,'').replace(/\./g,'').replace(',','.').trim();
};

/* UPDATE */
function upd(sh,ri,ci,val){
  DB[sh].rows[ri][ci]=val;
  markDirty();
  // re-color dias cell if dias column changed
  const col=DB[sh].columns[ci],cfg=CCFG[col]||{};
  if(cfg.t==='dias'){
    const n=parseFloat(val),row=document.querySelector(`#tb-${sh} tr[data-ri="${ri}"]`);
    if(row){
      const td=row.querySelectorAll('td')[ci+1];
      if(td){td.className='';td.classList.add(!isNaN(n)?n<=30?'d-ok':n<=45?'d-warn':'d-over':'');}
    }
  }
}

/* SORT */
function sortT(sh,ci){
  const vs=VS[sh];vs.sc===ci?vs.sd*=-1:(vs.sc=ci,vs.sd=1);
  renderHdr(sh);applyF(sh);
}

/* DELETE */
function askDel(sh,ri){pendDel={sh,ri};document.getElementById('confirm-bg').classList.add('open');}
function closeConfirm(){pendDel=null;document.getElementById('confirm-bg').classList.remove('open');}
function doDelete(){
  if(!pendDel)return;
  DB[pendDel.sh].rows.splice(pendDel.ri,1);
  closeConfirm();markDirty();applyF(pendDel.sh);renderHdr(pendDel.sh);
}

/* MODAL */
function openModal(sh){
  modalSheet=sh;
  const cols=DB[sh].columns;
  document.getElementById('modal-title').textContent=sh==='vagas'?'＋ Nova Vaga':'＋ Novo Candidato';
  const frm=document.getElementById('modal-form');
  frm.innerHTML=cols.map(col=>{
    const cfg=CCFG[col]||{},lbl=cfg.label||col,wide=cfg.wrap||(cfg.w&&cfg.w>=180);
    let inp;
    if(cfg.t==='svaga')inp=`<select name="${esc(col)}">${SV.map(o=>`<option>${esc(o)}</option>`).join('')}</select>`;
    else if(cfg.t==='scand')inp=`<select name="${esc(col)}">${SC.map(o=>`<option>${esc(o)}</option>`).join('')}</select>`;
    else if(cfg.t==='mes')inp=`<select name="${esc(col)}">${SM.map(o=>`<option>${esc(o)}</option>`).join('')}</select>`;
    else if(cfg.t==='moeda')inp=`<input type="text" name="${esc(col)}" placeholder="Ex: 2500,00">`;
    else if(wide)inp=`<textarea name="${esc(col)}" rows="2"></textarea>`;
    else inp=`<input type="text" name="${esc(col)}">`;
    return `<div class="fg${wide?' s2':''}""><label>${esc(lbl)}</label>${inp}</div>`;
  }).join('');
  document.getElementById('add-modal').classList.add('open');
}
function closeModal(){document.getElementById('add-modal').classList.remove('open');modalSheet=null;}
function saveModal(){
  if(!modalSheet)return;
  const cols=DB[modalSheet].columns,frm=document.getElementById('modal-form');
  const nr=cols.map(col=>{
    const cfg=CCFG[col]||{},el=frm.querySelector(`[name="${CSS.escape(col)}"]`);
    if(!el)return'';
    return cfg.t==='moeda'?unfmtM(el.value):el.value;
  });
  DB[modalSheet].rows.push(nr);closeModal();markDirty();applyF(modalSheet);renderHdr(modalSheet);
  setTimeout(()=>{const w=document.querySelector(`#sheet-${modalSheet} .twrap`);if(w)w.scrollTop=w.scrollHeight;},80);
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function badgeCls(v){
  const u=(v||'').toUpperCase();
  if(u.includes('FECHAD')||u.includes('APROVAD'))return'b1';
  if(u.includes('ANDAMENTO'))return'b2';
  if(u.includes('CANCELAD')||u.includes('REPROVAD'))return'b3';
  if(u.includes('STAND BY')||u.includes('DECLINOU'))return'b4';
  return'b0';
}
function openStatusSel(span){
  const td=span.closest('td');
  const sel=td.querySelector('.status-sel');
  if(!sel)return;
  span.style.display='none';
  sel.style.display='block';
  sel.focus();
}
function closeStatusSel(sel){
  const td=sel.closest('td');
  const span=td.querySelector('.status-cell');
  if(!span)return;
  sel.style.display='none';
  span.style.display='flex';
  // update badge text & class
  const val=sel.value;
  const badge=span.querySelector('.badge');
  if(badge){badge.textContent=val||'—';badge.className='badge '+badgeCls(val);}
}
function updateBadge(sel){
  // called on change before blur fires
  closeStatusSel(sel);
}

/* INIT */
['vagas','candidatos'].forEach(sh=>{renderHdr(sh);applyF(sh);});
